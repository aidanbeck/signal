<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0"/>
  <title>Sonar Search</title>
  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/abilities.js" defer></script>
  <style>
    html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    }
    canvas {
      height: 100vh;
      flex: 1;

      cursor: crosshair;
    }
    div {
      flex: 1;
      margin-left: 1%;
      margin-right: -1%;
    }
  </style>
</head>
<body>
  <canvas id="theatre"></canvas>
  <div>
    <h1>SONAR</h1>
    <h2>Abilities</h2>
    <button id="distanceAbility">Distance</button>
    <br><br>
    <button id="boueyAbility">Bouey</button>
    <br><br>
    <button>Hot or Cold (Not Implemented)</button>
    <br><br>
    <button id="longitudeAbility">Longitude</button>
    <button id="latitudeAbility">Latitude</button>
    <br><br>
    <button id="radius2kAbility">Radius (2k)</button>
    <button id="radius4kAbility">Radius (4k)</button>
    <button id="radius8kAbility">Radius (8k)</button>
    <br><br>
    <hr>

    <h1>Hit</h1>
    x: <input id="xInput"><br>
    y: <input id="yInput"><br>
    <button id="launchMissile">Launch</button>
  </div>
</body>
</html>
